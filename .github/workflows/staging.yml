name: Deploy to Staging

on:
  push:
    branches: [develop]
    paths:
      - "supabase/**"

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.TF_VAR_SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      # ============================================
      # 1. Setup Dependencies
      # ============================================
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
          cache-hash: ${{ hashFiles('supabase/functions/**/deno.lock') }}

      # ============================================
      # 2. Validation
      # ============================================
      - name: Check migration integrity
        run: |
          chmod +x .scripts/migration-guard.sh
          ./.scripts/migration-guard.sh

      - name: Run Edge Functions validation
        run: |
          chmod +x .scripts/deno-check.sh
          ./.scripts/deno-check.sh

      # ============================================
      # 3. Deploy
      # ============================================
      - name: Link to Supabase project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy database migrations
        run: supabase db push

      - name: Seed storage buckets
        run: supabase seed buckets --linked --yes

      - name: Deploy Edge Functions
        run: supabase functions deploy --no-verify-jwt --prune --yes
