name: Deployment Notification

on:
  workflow_run:
    workflows:
      - "Deploy to Production"
      - "Deploy to Staging"
      - "Terraform Production Environment"
      - "Terraform Staging Environment"
    types:
      - completed

jobs:
  notify:
    name: Notify on Deployment Status
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure'
    environment: ${{ contains(github.event.workflow_run.name, 'Production') && 'production' || 'staging' }}

    steps:
      - name: Get commit information
        id: commit_info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 커밋 작성자 정보 가져오기
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          COMMIT_INFO=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/commits/$COMMIT_SHA")
          COMMIT_AUTHOR=$(echo "$COMMIT_INFO" | jq -r '.commit.author.email')

          STATUS="${{ github.event.workflow_run.conclusion }}"
          URL="${{ github.event.workflow_run.html_url }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"

          # 워크플로우 이름에서 환경 추출
          if echo "$WORKFLOW_NAME" | grep -qi "Production"; then
            ENV_NAME="production"
          else
            ENV_NAME="staging"
          fi

          # 상태에 따라 메시지 설정
          if [ "$STATUS" = "success" ]; then
            TITLE="🚀 [BACKEND] Deployment $STATUS 🚀"
            STATUS_COLOR="#28a745"
            STATUS_MESSAGE="배포 성공"
          else
            TITLE="❌ [BACKEND] Deployment $STATUS ❌"
            STATUS_COLOR="#dc2626"
            STATUS_MESSAGE="배포 실패"
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "statusColor=$STATUS_COLOR" >> $GITHUB_OUTPUT
          echo "statusMessage=$STATUS_MESSAGE" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "envName=$ENV_NAME" >> $GITHUB_OUTPUT

      - name: Notify Google Chat
        env:
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: |
          if [ -z "$GOOGLE_CHAT_WEBHOOK_URL" ]; then
            echo "⚠️ GOOGLE_CHAT_WEBHOOK_URL secret이 설정되지 않았습니다. Google Chat 알림을 건너뜁니다."
            exit 0
          fi

          # Google Chat Cards v2 형식으로 메시지 전송
          curl -X POST "$GOOGLE_CHAT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "cardsV2": [
              {
                "cardId": "deployment-notification",
                "card": {
                  "header": {
                    "title": "${{ steps.commit_info.outputs.title }}",
                    "subtitle": "배포 알림"
                  },
                  "sections": [
                    {
                      "widgets": [
                        {
                          "decoratedText": {
                            "text": "<font color=\"${{ steps.commit_info.outputs.statusColor }}\">${{ steps.commit_info.outputs.statusMessage }}</font>"
                          }
                        }
                      ]
                    },
                    {
                      "widgets": [
                        {
                          "decoratedText": {
                            "topLabel": "ENVIRONMENT",
                            "text": "${{ steps.commit_info.outputs.envName }}"
                          }
                        },
                        {
                          "decoratedText": {
                            "topLabel": "COMMIT AUTHOR",
                            "text": "${{ steps.commit_info.outputs.author }}"
                          }
                        },
                        {
                          "decoratedText": {
                            "topLabel": "STATUS",
                            "text": "<font color=\"${{ steps.commit_info.outputs.statusColor }}\">${{ steps.commit_info.outputs.status }}</font>"
                          }
                        }
                      ]
                    },
                    {
                      "widgets": [
                        {
                          "buttonList": {
                            "buttons": [
                              {
                                "text": "View Workflow",
                                "onClick": {
                                  "openLink": {
                                    "url": "${{ steps.commit_info.outputs.url }}"
                                  }
                                }
                              }
                            ]
                          }
                        }
                      ]
                    }
                  ]
                }
              }
            ]
          }
          EOF
